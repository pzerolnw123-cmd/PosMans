name: Security Baseline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: posmans_ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d posmans_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BACKEND_URL: http://localhost:4000
      DATABASE_URL: postgresql://ci:ci@localhost:5432/posmans_ci
      DIRECT_DATABASE_URL: postgresql://ci:ci@localhost:5432/posmans_ci
      SESSION_SECRET: ci-smoke-session-secret-at-least-32-chars
      E2E_RUN_OWNER_FLOWS: "1"
      E2E_OWNER_USERNAME: e2e.owner
      E2E_OWNER_PASSWORD: E2eOwnerPassword123!
      E2E_OWNER_PIN: "123456"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare CI database
        run: npm --prefix backend run db:push

      - name: Seed authenticated e2e data
        run: npm --prefix backend run seed:e2e

      - name: Secret scan
        run: npm run security:secrets

      - name: Dependency audit
        run: npm run security:audit

      - name: Backend tests
        run: npm run test:backend

      - name: Frontend logic tests
        run: npm --prefix frontend run test:logic

      - name: Frontend lint
        run: npm run lint:frontend

      - name: Frontend build
        run: npm run build:frontend

      - name: Production readiness smoke
        run: npm run security:production

      - name: Frontend build smoke
        run: npm --prefix frontend run build:smoke

      - name: Frontend theme contrast
        run: npm --prefix frontend run theme:contrast

      - name: Install Playwright browser
        run: npm --prefix frontend run e2e:install

      - name: Frontend e2e smoke
        env:
          PLAYWRIGHT_SMOKE_ONLY: "1"
          PLAYWRIGHT_FRONTEND_MODE: start
        run: npm --prefix frontend run e2e:smoke

      - name: Frontend visual smoke
        env:
          PLAYWRIGHT_SMOKE_ONLY: "1"
          PLAYWRIGHT_SKIP_BACKEND_SERVER: "1"
          PLAYWRIGHT_FRONTEND_MODE: start
        run: npm --prefix frontend run e2e:visual

      - name: Frontend authenticated owner e2e
        env:
          PLAYWRIGHT_FRONTEND_MODE: start
        run: npm --prefix frontend run e2e:owner
