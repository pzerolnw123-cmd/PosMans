name: Security Baseline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: http://localhost:4000
      DATABASE_URL: postgresql://ci:ci@localhost:5432/posmans_ci
      DIRECT_DATABASE_URL: postgresql://ci:ci@localhost:5432/posmans_ci
      SESSION_SECRET: ci-smoke-session-secret-at-least-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: npm run security:secrets

      - name: Dependency audit
        run: npm run security:audit

      - name: Backend tests
        run: npm run test:backend

      - name: Frontend lint
        run: npm run lint:frontend

      - name: Frontend build
        run: npm run build:frontend

      - name: Production readiness smoke
        run: npm run security:production

      - name: Frontend build smoke
        run: npm --prefix frontend run build:smoke

      - name: Install Playwright browser
        run: npm --prefix frontend run e2e:install

      - name: Frontend e2e smoke
        env:
          PLAYWRIGHT_SMOKE_ONLY: "1"
          PLAYWRIGHT_FRONTEND_MODE: start
        run: npm --prefix frontend run e2e:smoke
